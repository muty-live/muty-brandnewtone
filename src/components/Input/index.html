<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input コンポーネント</title>
  <link rel="stylesheet" href="../../styles/index.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- ユーティリティ（確認用） --- */
    .sample-section {
      padding: 24px;
      border-bottom: 1px solid var(--color-border);
    }
    .sample-section h2 {
      font-size: 14px;
      color: var(--color-muted-foreground);
      margin-bottom: 12px;
      font-weight: 600;
    }
  </style>  
</head>
<body>

  <div class="sample-section">
    <h2>テキスト入力フォーム（デフォルト）</h2>
    <input id="name" required="" class="input" placeholder="山田 太郎" type="text" value="" name="name">
  </div>

  <div class="sample-section">
    <h2>テキスト入力フォーム（セレクトボックス）</h2>
    <select id="subject" name="subject" required="" class="input">
      <option value="">選択してください</option>
      <option value="general">一般的なお問い合わせ</option>
      <option value="technical">技術的な問題</option>
      <option value="payment">お支払いについて</option>
      <option value="performer">女優登録について</option>
      <option value="account">アカウントについて</option>
      <option value="other">その他</option>
    </select>
  </div>

  <div class="sample-section">
    <h2>テキスト入力フォーム（テキストエリア）</h2>
    <textarea id="message" name="message" required="" rows="6" class="input" placeholder="お問い合わせ内容をご記入ください"></textarea>
  </div>

  <div class="sample-section">
    <h2>テキスト入力フォーム（チェック）</h2>
    <div class="input--check-container">
      <input id="terms" class="input--check" type="checkbox">
      <label for="terms" class="input--check-text">
        <a class="input--check-link" href="/user/terms" data-discover="true">利用規約</a>に同意します
      </label>
    </div>
  </div>

  <div class="sample-section">
    <h2>検索エリア</h2>
    <div class="input--search-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input--search-icon">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input placeholder="女優名で検索..." class="input input--search" type="text" value="">
    </div>
  </div>

  <div class="sample-section">
    <h2>コメント投稿</h2>
    <div class="input--comment">
      <input placeholder="コメントを入力..." class="input--comment-form" type="text" value="">
      <button class="input--comment-send">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input--comment-send-icon">
          <path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"></path>
          <path d="m21.854 2.147-10.94 10.939"></path>
        </svg>
      </button>
    </div>
  </div>

</body>
</html>
